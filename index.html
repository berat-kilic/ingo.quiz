<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>INGO | Competitive Quiz</title>
    <link rel="icon" type="image/png" href="/ingo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              base: '#0B121E',
              card: '#161F2E',
              primary: '#007BFF',
              'primary-glow': 'rgba(0, 123, 255, 0.4)',
              gold: '#FFD700',
              'gold-dark': '#B8860B',
              danger: '#FF4D4D',
              success: '#10B981',
            },
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
              display: ['Montserrat', 'sans-serif'],
            },
            animation: {
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #0B121E;
        color: white;
        overscroll-behavior: none;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0B121E; 
      }
      ::-webkit-scrollbar-thumb {
        background: #161F2E; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #007BFF; 
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
